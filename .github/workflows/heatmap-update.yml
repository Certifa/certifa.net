name: Update HTB heatmap

on:
  schedule:
    # 4× per day — every 6 hours, on the hour, in UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: heatmap
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch activity
        env:
          DISCORD_BOT_TOKEN:  ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: node scripts/fetch-htb-activity.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- public/data/heatmap.json; then
            echo "no change in heatmap.json"
            exit 0
          fi
          git add public/data/heatmap.json
          git commit -m "chore(heatmap): refresh HTB activity data"
          git push
